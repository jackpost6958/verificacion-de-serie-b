<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Detector de Series BOB</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00ff88">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="main-ui">
    <header>
      <h1>Detector de Serie Ilegal</h1>
      <p class="disclaimer">Verifique siempre el resultado visualmente. Esta herramienta es una ayuda técnica no oficial.</p>
    </header>

    <div class="setup-card">
      <label for="denominacion">Denominación del Billete:</label>
      <select id="denominacion">
        <option value="10">Bs. 10</option>
        <option value="20" selected>Bs. 20</option>
        <option value="50">Bs. 50</option>
      </select>
      <button id="scanBtn">Iniciar Escáner 📷</button>
    </div>

    <a href="donaciones.jpg" download="donaciones.jpg" class="donate-link" id="donateBtn">
      Apoyar con una Donación 🎁
    </a>
  </div>

  <div id="scanner-container" hidden>
    <video id="video" autoplay playsinline muted></video>
    <div id="overlay">
      <div id="guide-box">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="scan-line"></div>
      </div>
      <p id="status-msg">Cargando motor de IA...</p>
    </div>
    <button id="closeBtn">✖</button>
  </div>

  <canvas id="canvas" hidden></canvas>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(err => console.log(err));
    }
  </script>

  <div id="custom-modal" hidden>
    <div class="modal-content">
      <h2 id="modal-title">Resultado</h2>
      <p id="modal-text"></p>
      <p class="modal-instruction">Compare el número detectado con el billete real.</p>
      <button id="modal-close">Cerrar</button>
    </div>
  </div>
</body>
</html>
