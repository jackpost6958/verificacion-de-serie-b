<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Detector de Billetes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main-ui">
    <header>
      <h1>Detector de Billetes</h1>
      <p class="disclaimer">Uso informativo. No reemplaza plataformas oficiales.</p>
    </header>

    <div class="setup-card">
      <label for="denominacion">Selecciona el valor:</label>
      <select id="denominacion">
        <option value="10">Bs. 10</option>
        <option value="20" selected>Bs. 20</option>
        <option value="50">Bs. 50</option>
      </select>
      <button id="scanBtn">Iniciar Escáner 📷</button>
    </div>
  </div>

  <div id="scanner-container" hidden>
    <video id="video" autoplay playsinline></video>
    <div id="overlay">
      <div id="guide-box">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="scan-line"></div>
      </div>
      <p id="status-msg">Enfoque la serie numérica</p>
    </div>
    <button id="closeBtn">✖</button>
  </div>

  <canvas id="canvas" hidden></canvas>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
